<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/form.css">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div class="title__container">
        <a href="landing-page.html"><img class="logo" src="./images/leaf.png" alt="logo"></a>
        <h1>Login</h1>
        <button class="change-theme" type="button">☀ Change theme</button>
    </div>

    <span class="loader-overlay hidden"></span>
    <span class="error-message-box hidden"></span>
    <div class="form__container">

        <form>
            <div class="form__field">
                <label for="user">User</label>
                <input type="text" name="user" id="user" placeholder="Username">
                <span class="error-message" id="user-error"></span>
            </div>
            <div class="form__field">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="E-mail">
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form__field">
                <label for="password">Password</label>
                <div class="password__wrapper">
                    <input type="password" name="password" id="password" placeholder="Password">
                    <svg class="show-password-icon" id="show-password" xmlns="http://www.w3.org/2000/svg" height="20px"
                        viewBox="0 -960 960 960" width="20px" fill="#009688">
                        <path
                            d="M607.5-372.5Q660-425 660-500t-52.5-127.5Q555-680 480-680t-127.5 52.5Q300-575 300-500t52.5 127.5Q405-320 480-320t127.5-52.5Zm-204-51Q372-455 372-500t31.5-76.5Q435-608 480-608t76.5 31.5Q588-545 588-500t-31.5 76.5Q525-392 480-392t-76.5-31.5ZM214-281.5Q94-363 40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200q-146 0-266-81.5ZM480-500Zm207.5 160.5Q782-399 832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T128-500q50 101 144.5 160.5T480-280q113 0 207.5-59.5Z" />
                    </svg>
                </div>
                <span class="error-message" id="password-error"></span>
            </div>

            <div class="form__buttons">
                <button type="button" class="standard-btn" id="login-btn">Login</button>
                <a class="standard-btn" href="register.html">Sign Up</a>


            </div>
            <a href="forgot-password.html" class="forgot-password">Forgot your password?</a>
        </form>
    </div>

    <script src="config/config.js"></script>
    <script src="utils/theme.js"></script>
    <script type="module" src="services/login.js"></script>
</body>

</html>
